name: evoting_app
description: Secure Mobile-Based E-Voting System for College Elections
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  flutter_spinkit: ^5.2.1
  lottie: ^3.1.0
  fluttertoast: ^8.2.4
  fl_chart: ^0.68.0

  # Utils
  connectivity_plus: ^6.0.3
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
