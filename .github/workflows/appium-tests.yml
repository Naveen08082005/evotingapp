name: Appium Mobile Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appium-mobile-testing:
    name: Execute Appium Mobile Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Appium-Python-Client pytest pytest-html openpyxl requests

      - name: Run Appium Mobile Suite
        run: |
          python test/appium_test_runner.py || true
          pytest appium_tests/tests/ --html=appium_functional_report.html --self-contained-html || true

      - name: Upload Appium Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-report
          path: |
            appium_functional_report.html
          retention-days: 14
