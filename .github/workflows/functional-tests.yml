name: Functional Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  functional-testing:
    name: Run Functional E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Flutter Web App
        run: flutter build web --release

      - name: Host Flutter Web App
        run: |
          cd build/web
          python -m http.server 8000 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Test Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Functional Selenium Test cases
        run: |
          pytest e2e/test_login_flow.py --html=functional_report.html --self-contained-html

      - name: Stop Local Server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID
          fi

      - name: Upload Functional Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-test-report
          path: functional_report.html
          retention-days: 14
