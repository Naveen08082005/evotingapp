name: Flutter Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-verification:
    name: Flutter Lint and APK Compile
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Static Code Analysis
        # Enforce coding rules and lint checks
        run: flutter analyze

      - name: Build Debug APK
        # Verifies compilation succeeds with build-time constants
        run: flutter build apk --debug --dart-define=SUPABASE_URL=https://xyczocswufelhpcrmjow.supabase.co --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
